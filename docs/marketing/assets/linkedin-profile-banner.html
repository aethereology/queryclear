<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>queryclear — LinkedIn profile banner</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --paper:#f7f4ee;
    --paper-soft:rgba(247,244,238,.66);
    --ink:#17180f;
    --pine:#12352a;
    --pine-2:#0c2a21;
    --lime:#b6f03c;
    --lime-deep:#8fcf1f;
    --line:rgba(247,244,238,.12);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:#0a221a}

  /* Rendered at 2x of LinkedIn's 1584x396 profile background -> 3168 x 792.
     A personal profile overlays a circular PROFILE PHOTO at the bottom-left,
     so the composition is CENTERED and the bottom-left is kept clear. */
  #card{
    position:relative;
    width:3168px;
    height:792px;
    overflow:hidden;
    background:
      radial-gradient(110% 150% at 50% -30%, rgba(182,240,60,.16) 0%, rgba(182,240,60,0) 48%),
      linear-gradient(135deg, #12352a 0%, #0c2a21 58%, #081e17 100%);
    font-family:'IBM Plex Mono', ui-monospace, monospace;
    color:var(--paper);
  }

  /* faint engineering grid, like the site's machine panels */
  #card::before{
    content:"";
    position:absolute; inset:0;
    background-image:
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size:72px 72px;
    -webkit-mask-image:radial-gradient(130% 120% at 50% 46%, #000 32%, transparent 82%);
            mask-image:radial-gradient(130% 120% at 50% 46%, #000 32%, transparent 82%);
    opacity:.45;
  }
  /* hairline frame */
  #card::after{
    content:"";
    position:absolute; inset:34px;
    border:1px dashed rgba(247,244,238,.16);
    pointer-events:none;
  }

  .inner{
    position:relative;
    z-index:2;
    height:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:28px;
    text-align:center;
    padding:60px 160px;
  }

  .brand{display:flex; align-items:center; gap:18px}
  .brand svg{width:38px; height:38px; overflow:visible}
  .wordmark{
    font-family:'Bricolage Grotesque', system-ui, sans-serif;
    font-weight:700;
    font-size:46px;
    letter-spacing:-.02em;
    line-height:1;
    color:var(--paper);
  }
  .wordmark .dot{color:var(--lime)}

  .eyebrow{
    font-size:21px;
    font-weight:500;
    letter-spacing:.32em;
    text-transform:uppercase;
    color:var(--paper-soft);
  }
  .eyebrow .b{color:var(--lime-deep)}

  h1{
    font-family:'Bricolage Grotesque', system-ui, sans-serif;
    font-weight:700;
    font-size:104px;
    line-height:1.0;
    letter-spacing:-.025em;
    color:var(--paper);
    white-space:nowrap;
  }
  h1 .hl{ color:var(--lime); }

  .sub{
    font-size:27px;
    line-height:1.5;
    letter-spacing:.02em;
    color:var(--paper-soft);
    max-width:1720px;
  }

  .chips{display:flex; flex-wrap:nowrap; gap:14px; justify-content:center; margin-top:4px}
  .chip{
    font-size:19px;
    letter-spacing:.05em;
    color:var(--paper);
    border:1px solid rgba(247,244,238,.22);
    padding:10px 18px;
    white-space:nowrap;
  }
  .chip.url{
    border-color:rgba(182,240,60,.45);
    color:var(--lime);
    font-weight:600;
    letter-spacing:.07em;
  }
</style>
</head>
<body>
  <div id="card">
    <div class="inner">
      <div class="brand">
        <svg viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <circle cx="10" cy="10" r="6" stroke="#f7f4ee" stroke-width="1.5" />
          <circle cx="16" cy="10" r="2" fill="#b6f03c" />
        </svg>
        <span class="wordmark">queryclear<span class="dot">.</span></span>
      </div>

      <div class="eyebrow"><span class="b">[</span>&nbsp;Founder &middot; queryclear&nbsp;<span class="b">]</span></div>

      <h1>Modern SEO for the <span class="hl">AI search</span> era.</h1>

      <p class="sub">I help service businesses become easier for Google and AI answer engines to find, understand, trust, and cite.</p>

      <div class="chips">
        <span class="chip">ChatGPT</span>
        <span class="chip">Claude</span>
        <span class="chip">Perplexity</span>
        <span class="chip">Gemini</span>
        <span class="chip">AI Overviews</span>
        <span class="chip">Copilot</span>
        <span class="chip url">queryclear.com</span>
      </div>
    </div>
  </div>
</body>
</html>
